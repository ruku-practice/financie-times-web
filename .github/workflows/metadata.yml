name: FiNANCiE metadata update

on:
  repository_dispatch:
    types: [run-metadata-update]
  schedule:
    # フォールバック専用: 23:30 JST = 14:30 UTC。Checks new slugs and changed image URLs.
    - cron: "30 14 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "本日分が既にあっても強制実行する"
        required: false
        default: false
        type: boolean
      test_mode:
        description: "Run without writing to Google Sheets"
        required: false
        default: false
        type: boolean
      pages:
        description: "Number of FiNANCiE list pages to scan"
        required: false
        default: "15"
        type: string
      skip_image_check:
        description: "Skip existing image URL checks"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: financie-metadata-update
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if already updated today (JST)
        id: check
        env:
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force == true }}
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y%m%d)
          LAST=$(python -c "import json; print(json.load(open('data/projects_summary.json'))[0].get('latest_date',''))" 2>/dev/null || echo "")
          echo "today(JST)=$TODAY / latest_date=$LAST"
          if [ "$FORCE_RUN" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "▶ force=true のため強制実行します。"
          elif [ "$LAST" = "$TODAY" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "✅ 本日($TODAY)は既に更新済み。以降のステップをスキップします。"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "▶ 本日($TODAY)は未更新。実行します。"
          fi

      - name: Set up Python
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: steps.check.outputs.run == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Write service account credentials
        if: steps.check.outputs.run == 'true'
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > service_account.json
          echo "wrote service_account.json ($(wc -c < service_account.json) bytes)"

      - name: Run metadata update
        if: steps.check.outputs.run == 'true'
        env:
          GOOGLE_CREDENTIALS_PATH: ${{ github.workspace }}/service_account.json
          FINANCIE_EMAIL: ${{ secrets.FINANCIE_EMAIL }}
          FINANCIE_PASSWORD: ${{ secrets.FINANCIE_PASSWORD }}
          PYTHONUNBUFFERED: "1"
          TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.test_mode == true }}
          PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.pages || '15' }}
          SKIP_IMAGE_CHECK: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_image_check == true }}
        run: |
          ARGS=""
          if [ "$TEST_MODE" = "true" ]; then
            ARGS="--test"
          fi
          if [ -n "$PAGES" ]; then
            ARGS="$ARGS --pages $PAGES"
          fi
          if [ "$SKIP_IMAGE_CHECK" = "true" ]; then
            ARGS="$ARGS --skip-image-check"
          fi
          python scripts/update_metadata.py $ARGS

      - name: Commit and push changes
        if: ${{ steps.check.outputs.run == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.test_mode == true) }}
        run: |
          rm -f service_account.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No metadata changes."
          else
            git commit -m "chore: update FiNANCiE metadata ($(TZ=Asia/Tokyo date +%Y-%m-%dT%H:%MJST))"
            git pull --rebase --autostash origin main
            git push
          fi
