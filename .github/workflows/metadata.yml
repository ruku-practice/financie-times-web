name: FiNANCiE metadata update

on:
  schedule:
    # 22:30 JST = 13:30 UTC. Checks new slugs and changed image URLs.
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Run without writing to Google Sheets"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: financie-metadata-update
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Write service account credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > service_account.json
          echo "wrote service_account.json ($(wc -c < service_account.json) bytes)"

      - name: Run metadata update
        env:
          GOOGLE_CREDENTIALS_PATH: ${{ github.workspace }}/service_account.json
          FINANCIE_EMAIL: ${{ secrets.FINANCIE_EMAIL }}
          FINANCIE_PASSWORD: ${{ secrets.FINANCIE_PASSWORD }}
          PYTHONUNBUFFERED: "1"
          TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.test_mode == true }}
        run: |
          ARGS=""
          if [ "$TEST_MODE" = "true" ]; then
            ARGS="--test"
          fi
          python scripts/update_metadata.py $ARGS

      - name: Commit and push changes
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.test_mode == true) }}
        run: |
          rm -f service_account.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No metadata changes."
          else
            git commit -m "chore: update FiNANCiE metadata ($(TZ=Asia/Tokyo date +%Y-%m-%dT%H:%MJST))"
            git pull --rebase --autostash origin main
            git push
          fi
